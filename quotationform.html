<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cuprum:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/media.css"/>    
</head>
<body>

    <header>
        <div class="container">
            <div class="nav-container">
                <div class="nav-links-bx">
                    <div class="logo-bx">
                       <a href="index.html" class="logo"> Compare360 </a>
                     </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="quotation-sec sec-padding">
        <div class="container">
            <div class="hero-main-container">
                <div class="row">                
                <div class="quotation-form">
                    <div class="form-bx">
                        <div class="quote-card" id="quote">
                            <h3>Instant Quote Form</h3>

                            <form>
                                <div class="form-group">
                                    <select>
                                        <option>Select Category</option>
                                        <option>Life Insurance</option>
                                        <option>Health Insurance</option>
                                        <option>Auto Insurance</option>
                                        <option> Home Insurance</option>
                                        <option>Travel Insurance</option>
                                        <option>Business Insurance</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <input type="text" required placeholder="Full Name">
                                </div>

                                <div class="form-group">
                                    <input type="email" required placeholder="Email Address">
                                </div>

                                <div class="form-group">
                                    <input type="text" required placeholder="Zip Code">
                                </div>

                                <div class="form-group">
                                    <textarea rows="4" required placeholder="Tell us about your project or coverage needs"></textarea>
                                </div>

                                <button type="submit" class="btn-submit">
                                    submit <i class="fas fa-paper-plane"></i> 
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>    
    </section>    

    <script src="js/script.js"></script>
</body>
</html>
