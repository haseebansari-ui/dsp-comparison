<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Insurance</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Manrope',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#07111f;
color:#fff;
overflow-x:hidden;
}

.other-nav-link ul{
    display:none;
}

/* OPEN MENU */
.other-nav-link ul.active{
    display:block;
}

/* ICON STYLE */
.menu-toggle{
    cursor:pointer;
    font-size:28px;
    position:relative;
    width:30px;
    height:30px;
}

/* BOTH ICONS */
.menu-toggle i{
    position:absolute;
    transition:.3s ease;
}

/* CLOSE ICON HIDDEN DEFAULT */
.close-icon{
    opacity:0;
    visibility:hidden;
    transform:rotate(90deg);
}

/* ACTIVE STATE */
.menu-toggle.active .menu-icon{
    opacity:0;
    visibility:hidden;
    transform:rotate(90deg);
}

.menu-toggle.active .close-icon{
    opacity:1;
    visibility:visible;
    transform:rotate(0);
}



</style>
</head>

<body>


<!-- JAVASCRIPT -->

<script>

const menuBar = document.querySelector(".other-nav-link ul");
const menuToggle = document.querySelector(".menu-toggle");

menuToggle.addEventListener("click", () => {

    menuBar.classList.toggle("active");

    menuToggle.classList.toggle("active");

});

</script>

</body>
</html>
